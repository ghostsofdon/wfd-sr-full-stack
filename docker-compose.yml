version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: rop_db
    environment:
      POSTGRES_USER: rop
      POSTGRES_PASSWORD: rop_secret
      POSTGRES_DB: rop_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rop -d rop_db']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rop_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rop:rop_secret@db:5432/rop_db
      RMS_ENDPOINT: ${RMS_ENDPOINT:-https://webhook.site/test}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev_webhook_secret_change_in_prod}
      PORT: 3000
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx ts-node src/index.ts"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rop_frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
